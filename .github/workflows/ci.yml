name: CI

on:
  push:
    tags-ignore:
      - '**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install
      # Build submodules
      - name: Build ghostty-opentui native binaries
        run: bun scripts/build.ts linux-x64
        working-directory: ghostty-opentui
      - name: Build ghostty-opentui TypeScript
        run: pnpm run build
        working-directory: ghostty-opentui
      - name: Build tuistory
        run: pnpm run build
        working-directory: tuistory
      # scripts
      - run: pnpm run test || pnpm run test
        working-directory: termcast
